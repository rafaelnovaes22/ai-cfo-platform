[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Sem startCommand: o CMD do Dockerfile governa e ouve em $PORT (injetado pelo Railway).
# Fixar a porta aqui quebrava o healthcheck (serve em 3000, Railway sondava outra porta).
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Variáveis obrigatórias em prod (configurar no dashboard Railway):
# VITE_API_URL — URL pública do backend (ex: https://api.aicfo.com.br)
#   É build-time: o Railway passa a env como build arg (ARG VITE_API_URL no Dockerfile).
