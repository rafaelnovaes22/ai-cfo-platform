[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Sem startCommand: o CMD do Dockerfile governa e ouve em $PORT (injetado pelo Railway).
# Fixar a porta aqui quebrava o healthcheck (serve em 3000, Railway sondava outra porta).
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Variáveis obrigatórias por ambiente (configurar no dashboard Railway):
# VITE_API_URL — URL pública do backend.
#   staging: https://aicfo-staging-production.up.railway.app
#   prod:    https://aicfo-api-production.up.railway.app
# O Dockerfile gera /env.js em runtime, então a mesma imagem pode apontar para APIs diferentes.
