                        doneWhen:
                          type: string
                          nullable: true
                        clientApproved:
                          type: boolean
                          nullable: true
                        clientComment:
                          type: string
                          nullable: true
                        status:
                          type: string
                        statusReason:
                          type: string
                          nullable: true
                        lastStatusUpdatedAt:
                          type: string
