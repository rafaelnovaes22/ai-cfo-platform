openapi: 3.0.3
info:
  title: Ingest — Aicfo API
  description: Contract for the ingest module. Extracted from the canonical Aicfo OpenAPI spec.
  version: 0.2.0
servers:
  - url: http://localhost:3000
paths:
  /ingest/upload:
    post:
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysisId:
                    type: string
                  referenceMonth:
                    type: string
                  entryCount:
                    type: number
                  orphanCount:
                    type: number
                  outcome:
                    type: string
                    enum:
                      - completed
                      - partial
                      - failed
                required:
                  - analysisId
                  - referenceMonth
                  - entryCount
                  - orphanCount
                  - outcome
                additionalProperties: false
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                  detail:
                    type: string
                  instance:
                    type: string
                  requestId:
                    type: string
                required:
                  - type
                  - title
                  - status
                additionalProperties: false
  /ingest/clipboard:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                referenceMonth:
                  type: string
                  pattern: ^\d{4}-(0[1-9]|1[0-2])$
                text:
                  type: string
                  minLength: 10
                  maxLength: 1000000
              required:
                - referenceMonth
                - text
              additionalProperties: false
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysisId:
                    type: string
                  referenceMonth:
                    type: string
                  entryCount:
                    type: number
                  orphanCount:
                    type: number
                  outcome:
                    type: string
                    enum:
                      - completed
                      - partial
                      - failed
                required:
                  - analysisId
                  - referenceMonth
                  - entryCount
                  - orphanCount
                  - outcome
                additionalProperties: false
  /ingest/manual:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                referenceMonth:
                  type: string
                  pattern: ^\d{4}-(0[1-9]|1[0-2])$
                entries:
                  type: array
                  items:
                    type: object
                    properties:
                      date:
                        type: string
                        pattern: ^\d{4}-\d{2}-\d{2}$
                      description:
                        type: string
                        minLength: 1
                        maxLength: 200
                      amount:
                        anyOf:
                          - type: number
                            exclusiveMinimum: true
                            minimum: 0
                            maximum: 20000000
                          - type: string
                            minLength: 1
                            maxLength: 30
                      direction:
                        type: string
                        enum:
                          - credit
                          - debit
                    required:
                      - date
                      - description
                      - amount
                      - direction
                    additionalProperties: false
                  minItems: 1
                  maxItems: 200
              required:
                - referenceMonth
                - entries
              additionalProperties: false
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysisId:
                    type: string
                  referenceMonth:
                    type: string
                  entryCount:
                    type: number
                  orphanCount:
                    type: number
                  outcome:
                    type: string
                    enum:
                      - completed
                      - partial
                      - failed
                required:
                  - analysisId
                  - referenceMonth
                  - entryCount
                  - orphanCount
                  - outcome
                additionalProperties: false
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
