                          nullable: true
                      required:
                        - id
                        - date
                        - description
                        - amountCents
                        - direction
                        - predictedCategory
                        - confirmedCategory
                        - classificationConfidence
                        - correctionSource
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      cursor:
                        type: string
                        nullable: true
                      hasMore:
                        type: boolean
                      total:
                        type: number
                      requestId:
                        type: string
                    required:
                      - cursor
                      - hasMore
                      - total
                      - requestId
                    additionalProperties: false
                required:
