name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel runs concorrentes na mesma ref (não rodar PR duplo).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: lint • typecheck • build • tests • eval • prisma
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Sem banco externo no CI — Prisma generate/validate roda offline.
    env:
      # Dummies necessários só para o Prisma client gerar sem reclamar de env.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      # Dummies para Stripe/Langfuse/Anthropic — código não chama em build/teste.
      STRIPE_SECRET_KEY: "sk_test_dummy"
      STRIPE_WEBHOOK_SECRET: "whsec_dummy"
      ANTHROPIC_API_KEY: "dummy"
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Prisma — validate schema
        run: npx prisma validate

      - name: Prisma — generate client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Eval runner (validação estrutural offline)
        run: npm run eval:run

      - name: Audit (informational only — xlsx CVE documentada em ADR-003)
        run: npm audit --omit=dev --audit-level=high || true
        # `|| true` mantém o passo verde. ADR-003 documenta o risco residual.
        # Quando o `xlsx` ganhar fix upstream, remover o `|| true` e revisar a ADR.
