[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate deploy && node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Variáveis obrigatórias em prod (configurar no dashboard Railway):
# DATABASE_URL  — PostgreSQL URL com ?connection_limit=10&pool_timeout=20&schema=public
# REDIS_URL     — Redis URL (railway.internal ou externo)
# JWT_SECRET    — string aleatória forte (openssl rand -hex 32)
# GOOGLE_CLOUD_PROJECT / GOOGLE_CLOUD_LOCATION / GOOGLE_APPLICATION_CREDENTIALS_JSON
# LANGSMITH_API_KEY / LANGSMITH_PROJECT / LANGCHAIN_TRACING_V2 — tracing C6 (Forge v0.22.0+)
# STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET
# FRONTEND_ORIGIN — URL do frontend em prod (ex: https://app.aicfo.com.br)
# PUBLIC_API_URL  — URL pública do backend (ex: https://api.aicfo.com.br)
